version: "3.9"

# All images are open-source and can run on bare metal servers.
# No proprietary cloud services required.

services:

  # ── Apache Kafka 3.7 (KRaft mode — no ZooKeeper) ─────────────────────
  # Image: bitnami/kafka (Apache 2.0 license)
  # KRaft eliminates the ZooKeeper dependency for simpler bare-metal setup.
  kafka:
    image: bitnami/kafka:3.7
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Kafka UI ───────────────────────────────────────────────────────────
  # Image: provectuslabs/kafka-ui (Apache 2.0 license)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  # ── Prometheus ────────────────────────────────────────────────────────
  # Image: prom/prometheus (Apache 2.0 license)
  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command: ["--config.file=/etc/prometheus/prometheus.yml"]

  # ── Ollama — open-source LLM server ───────────────────────────────────
  # Image: ollama/ollama (MIT license)
  # Runs llama3.2 / mistral / qwen2.5 locally — no cloud API needed.
  # GPU: add 'deploy.resources.reservations.devices' below for NVIDIA GPU.
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Uncomment to enable NVIDIA GPU acceleration:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ── Model pull — runs once to download the default model ──────────────
  ollama-pull:
    image: ollama/ollama:latest
    depends_on: [ollama]
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: >
      /bin/sh -c "
        until ollama list --host http://ollama:11434 > /dev/null 2>&1; do
          echo 'Waiting for Ollama...'; sleep 3;
        done;
        OLLAMA_HOST=http://ollama:11434 ollama pull llama3.2
      "
    environment:
      OLLAMA_HOST: http://ollama:11434
    restart: "no"

  # ── UPI AI Scoring Validator API ──────────────────────────────────────
  validator-api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      # LLM backend — ollama (default, open-source) or anthropic (cloud)
      LLM_BACKEND:              ollama
      OLLAMA_BASE_URL:          http://ollama:11434
      OLLAMA_MODEL:             llama3.2
      # ANTHROPIC_API_KEY:      ${ANTHROPIC_API_KEY}   # uncomment for cloud

      # Kafka
      KAFKA_BOOTSTRAP_SERVERS:  kafka:9092
      KAFKA_TOPIC_RAW:          upi.balEnq.raw
      KAFKA_BATCH_SIZE:         "100"
      KAFKA_BATCH_TIMEOUT_S:    "30"

      # APM
      PROMETHEUS_URL:           http://prometheus:9090

      # Gate thresholds
      PROMOTE_THRESHOLD:        "85"
      REVIEW_THRESHOLD:         "70"

      # Environment
      FROM_ENV:                 staging
      TO_ENV:                   production
      AUDIT_LOG_PATH:           /app/logs/audit.ndjson
    volumes:
      - ./logs:/app/logs
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  kafka_data:
  prometheus_data:
  ollama_data:
