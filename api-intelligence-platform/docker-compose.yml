version: "3.9"

# AI-Powered API Intelligence Platform
# All components are open-source and run on bare metal or Docker.

services:

  # ── PostgreSQL with pgvector ──────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: api_intelligence
      POSTGRES_USER: api_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-api_secret_change_me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./graph/schema/postgres_init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U api_user -d api_intelligence"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Neo4j Graph Database ──────────────────────────────────────────────
  neo4j:
    image: neo4j:5.26-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-neo4j_secret_change_me}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
    ports:
      - "7474:7474"   # HTTP Browser
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./graph/schema:/import
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-neo4j_secret_change_me}", "RETURN 1"]
      interval: 20s
      timeout: 10s
      retries: 10

  # ── Redis (task queue + caching) ──────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Ollama — open-source LLM server (MIT) ────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU: uncomment below for NVIDIA GPU acceleration
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ── Pull default models ───────────────────────────────────────────────
  ollama-setup:
    image: ollama/ollama:latest
    depends_on: [ollama]
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: >
      /bin/sh -c "
        until ollama list --host http://ollama:11434 > /dev/null 2>&1; do
          echo 'Waiting for Ollama...'; sleep 3;
        done;
        OLLAMA_HOST=http://ollama:11434 ollama pull llama3.2 &&
        OLLAMA_HOST=http://ollama:11434 ollama pull nomic-embed-text
      "
    restart: "no"

  # ── FastAPI Backend ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL:          postgresql+asyncpg://api_user:${POSTGRES_PASSWORD:-api_secret_change_me}@postgres:5432/api_intelligence
      PGVECTOR_ENABLED:      "true"
      NEO4J_URI:             bolt://neo4j:7687
      NEO4J_USER:            neo4j
      NEO4J_PASSWORD:        ${NEO4J_PASSWORD:-neo4j_secret_change_me}
      REDIS_URL:             redis://redis:6379/0
      SECRET_KEY:            ${SECRET_KEY:-change_this_secret_key_in_production}
      AI_BACKEND:            ${AI_BACKEND:-ollama}
      OLLAMA_BASE_URL:       http://ollama:11434
      OLLAMA_MODEL:          llama3.2
      OLLAMA_EMBEDDING_MODEL: nomic-embed-text
      OPENAI_API_KEY:        ${OPENAI_API_KEY:-}
      OPENAI_MODEL:          ${OPENAI_MODEL:-gpt-4o-mini}
      CORS_ORIGINS:          '["http://localhost:3000","http://frontend:3000"]'
      ENVIRONMENT:           development
      UPLOAD_DIR:            /app/uploads
      LOG_LEVEL:             INFO
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Celery Worker (async ingestion) ──────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL:          postgresql+asyncpg://api_user:${POSTGRES_PASSWORD:-api_secret_change_me}@postgres:5432/api_intelligence
      PGVECTOR_ENABLED:      "true"
      NEO4J_URI:             bolt://neo4j:7687
      NEO4J_USER:            neo4j
      NEO4J_PASSWORD:        ${NEO4J_PASSWORD:-neo4j_secret_change_me}
      REDIS_URL:             redis://redis:6379/0
      SECRET_KEY:            ${SECRET_KEY:-change_this_secret_key_in_production}
      AI_BACKEND:            ${AI_BACKEND:-ollama}
      OLLAMA_BASE_URL:       http://ollama:11434
      OLLAMA_MODEL:          llama3.2
      OLLAMA_EMBEDDING_MODEL: nomic-embed-text
      OPENAI_API_KEY:        ${OPENAI_API_KEY:-}
      UPLOAD_DIR:            /app/uploads
    volumes:
      - ./backend/uploads:/app/uploads

  # ── Next.js Frontend ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL:   http://localhost:8000/api/v1
      INTERNAL_API_URL:      http://backend:8000/api/v1

  # ── Prometheus ────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./docs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  # ── Grafana ───────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.4.0
    depends_on: [prometheus]
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
  ollama_data:
  prometheus_data:
  grafana_data:
