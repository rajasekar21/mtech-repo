name: CI

on:
  push:
    branches: [project/api-intelligence-platform, main]
    paths: [api-intelligence-platform/**]
  pull_request:
    paths: [api-intelligence-platform/**]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api-intelligence-platform/backend/requirements.txt

      - name: Install
        working-directory: api-intelligence-platform/backend
        run: pip install -r requirements.txt

      - name: Syntax check
        working-directory: api-intelligence-platform/backend
        run: python -m py_compile main.py parser.py database.py && echo "OK"

      - name: Docker build
        uses: docker/build-push-action@v6
        with:
          context: api-intelligence-platform/backend
          push: false
          tags: api-intelligence:ci
