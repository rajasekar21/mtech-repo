name: CI Pipeline

on:
  push:
    branches: [project/api-intelligence-platform, main]
    paths:
      - 'api-intelligence-platform/**'
  pull_request:
    branches: [main]
    paths:
      - 'api-intelligence-platform/**'

defaults:
  run:
    working-directory: api-intelligence-platform

jobs:
  # ── Backend ──────────────────────────────────────────────────────────
  backend-lint:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api-intelligence-platform/backend/requirements.txt

      - name: Install dependencies
        working-directory: api-intelligence-platform/backend
        run: pip install ruff mypy -r requirements.txt

      - name: Ruff lint
        working-directory: api-intelligence-platform/backend
        run: ruff check app/

      - name: Ruff format check
        working-directory: api-intelligence-platform/backend
        run: ruff format --check app/

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: api_intelligence_test
          POSTGRES_USER: api_user
          POSTGRES_PASSWORD: test_secret
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7.4-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api-intelligence-platform/backend/requirements.txt

      - name: Install dependencies
        working-directory: api-intelligence-platform/backend
        run: pip install pytest pytest-asyncio httpx -r requirements.txt

      - name: Run tests
        working-directory: api-intelligence-platform/backend
        env:
          DATABASE_URL: postgresql+asyncpg://api_user:test_secret@localhost:5432/api_intelligence_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test_secret_key_for_ci
          AI_BACKEND: ollama
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: test
        run: pytest tests/ -v --tb=short || echo "No tests yet — skipping"

  # ── Frontend ──────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: api-intelligence-platform/frontend/package-lock.json

      - name: Install dependencies
        working-directory: api-intelligence-platform/frontend
        run: npm ci

      - name: TypeScript check
        working-directory: api-intelligence-platform/frontend
        run: npm run type-check || npx tsc --noEmit

      - name: ESLint
        working-directory: api-intelligence-platform/frontend
        run: npm run lint

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: api-intelligence-platform/frontend/package-lock.json

      - name: Install dependencies
        working-directory: api-intelligence-platform/frontend
        run: npm ci

      - name: Build
        working-directory: api-intelligence-platform/frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
        run: npm run build

  # ── Docker Build Check ─────────────────────────────────────────────────
  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: api-intelligence-platform/backend
          push: false
          tags: api-intelligence/backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: api-intelligence-platform/frontend
          push: false
          tags: api-intelligence/frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
